<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>En Construcción – Metalistería González S.A.S</title>
  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/img/favicon/favicon.svg" />
  <link rel="icon" type="image/png" sizes="96x96" href="assets/img/favicon/favicon-96x96.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="assets/img/favicon/apple-touch-icon.png" />
  <link rel="shortcut icon" href="assets/img/favicon/favicon.ico" />
  <link rel="manifest" href="assets/img/favicon/site.webmanifest" />
  <meta name="theme-color" content="#1A1A1A" />

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --accent: #f0c040;
      --accent2: #e05a2b;
      --text: #f0ede8;
      --muted: #7a7a8a;
      --grid: rgba(240,192,64,0.06);
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
    }

    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridScroll 20s linear infinite;
    }
    @keyframes gridScroll {
      from { background-position: 0 0; }
      to   { background-position: 60px 60px; }
    }

    .orb {
      position: fixed; border-radius: 50%;
      filter: blur(80px); opacity: 0.18;
      animation: float 8s ease-in-out infinite;
      z-index: 0; pointer-events: none;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -180px; left: -120px; animation-delay: 0s; }
    .orb-2 { width: 380px; height: 380px; background: var(--accent2); bottom: -140px; right: -100px; animation-delay: -4s; }
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%       { transform: translate(30px, -30px) scale(1.08); }
    }

    .noise {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 160px;
    }

    .page {
      position: relative; z-index: 2;
      width: 100%; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: clamp(1rem, 4vw, 2rem);
      text-align: center;
      gap: clamp(0.4rem, 1.5vh, 1rem);
    }

    /* LOGO BANNER */
    .logo-banner {
      animation: fadeDown 0.7s ease both;
      margin-bottom: clamp(0.2rem, 1vh, 0.6rem);
    }
    .logo-banner img {
      height: clamp(56px, 10vw, 100px);
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 4px 24px rgba(240,192,64,0.25));
      mix-blend-mode: lighten;
    }

    .badge {
      display: inline-flex; align-items: center; gap: 8px;
      border: 1px solid rgba(240,192,64,0.35);
      background: rgba(240,192,64,0.07);
      color: var(--accent);
      font-size: clamp(0.6rem, 1.5vw, 0.72rem);
      font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase;
      padding: 5px 14px; border-radius: 100px;
      animation: fadeDown 0.8s 0.05s ease both;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2.8rem, 10vw, 7.5rem);
      line-height: 0.88;
      letter-spacing: 0.02em;
      animation: fadeUp 0.9s 0.15s ease both;
    }
    h1 span.stroke {
      -webkit-text-stroke: 2px var(--accent);
      color: transparent;
    }
    h1 span.filled { color: var(--text); }

    .sub {
      font-size: clamp(0.78rem, 2vw, 1rem);
      color: var(--muted);
      max-width: 420px;
      line-height: 1.6;
      font-weight: 300;
      animation: fadeUp 0.9s 0.3s ease both;
    }

    .progress-wrap {
      width: min(400px, 88%);
      animation: fadeUp 0.9s 0.45s ease both;
    }
    .progress-meta {
      display: flex; justify-content: space-between;
      font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 8px;
    }
    .progress-meta span:last-child { color: var(--accent); font-weight: 500; }
    .progress-bar {
      height: 3px; background: rgba(255,255,255,0.07); border-radius: 10px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; width: 0;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 10px;
      animation: fillBar 2.2s 0.8s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes fillBar { to { width: 68%; } }

    .countdown {
      display: flex; gap: clamp(0.5rem, 2vw, 1.2rem);
      animation: fadeUp 0.9s 0.6s ease both;
    }
    .cd-block {
      display: flex; flex-direction: column; align-items: center;
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: clamp(8px, 2vh, 16px) clamp(12px, 3vw, 24px);
      min-width: clamp(56px, 12vw, 80px);
    }
    .cd-num {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(1.6rem, 5vw, 2.6rem);
      color: var(--accent);
      line-height: 1;
    }
    .cd-label {
      font-size: clamp(0.55rem, 1.2vw, 0.65rem);
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--muted); margin-top: 3px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="noise"></div>

<main class="page">

  <div class="logo-banner">
    <img src="assets/img/Banner2.png" alt="Metalistería González S.A.S" />
  </div>

  <div class="badge">
    <span class="badge-dot"></span>
    Sitio en construcción
  </div>

  <h1>
    <span class="stroke">Algo</span><br>
    <span class="filled">Grande</span><br>
    <span class="stroke">Viene</span>
  </h1>

  <p class="sub">
    Estamos trabajando duro para traerte algo increíble.
    Vuelve pronto, el resultado valdrá la pena.
  </p>

  <div class="progress-wrap">
    <div class="progress-meta">
      <span>Progreso</span>
      <span>68%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="countdown">
    <div class="cd-block">
      <div class="cd-num" id="days">00</div>
      <div class="cd-label">Días</div>
    </div>
    <div class="cd-block">
      <div class="cd-num" id="hours">00</div>
      <div class="cd-label">Horas</div>
    </div>
    <div class="cd-block">
      <div class="cd-num" id="mins">00</div>
      <div class="cd-label">Minutos</div>
    </div>
    <div class="cd-block">
      <div class="cd-num" id="secs">00</div>
      <div class="cd-label">Segundos</div>
    </div>
  </div>

</main>

<script>
  const target = new Date("2026-12-31T23:59:59");
  function pad(n) { return String(n).padStart(2, '0'); }
  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) return;
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('days').textContent  = pad(d);
    document.getElementById('hours').textContent = pad(h);
    document.getElementById('mins').textContent  = pad(m);
    document.getElementById('secs').textContent  = pad(s);
  }
  tick();
  setInterval(tick, 1000);
</script>
</body>
</html>
